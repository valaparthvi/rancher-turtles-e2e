name: Trigger E2E from PR Comment
run-name: "E2E dispatch from PR #${{ github.event.issue.number }}"

on:
  issue_comment:
    types: [created]

jobs:
  dispatch-e2e:
    if: >-
      github.event.issue.pull_request &&
      startsWith(github.event.comment.body, '/run-e2e')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - name: Check authorization
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          COMMENTER: ${{ github.event.comment.user.login }}
          REPO: ${{ github.repository }}
        run: |
          PERMISSION=$(gh api "repos/${REPO}/collaborators/${COMMENTER}/permission" --jq '.permission')
          if [[ "$PERMISSION" != "admin" && "$PERMISSION" != "write" ]]; then
            echo "::error::User ${COMMENTER} does not have write access (permission: ${PERMISSION})"

            gh api "repos/${REPO}/issues/comments/${{ github.event.comment.id }}/reactions" \
              -f content=confused --silent

            gh api "repos/${REPO}/issues/${{ github.event.issue.number }}/comments" \
              -f body="@${COMMENTER} You don't have permission to trigger E2E tests. Write access is required."

            exit 1
          fi
          echo "User ${COMMENTER} authorized with permission: ${PERMISSION}"

      - name: Add rocket reaction
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
            -f content=rocket --silent

      - name: Checkout
        uses: actions/checkout@v4

      - name: Parse comment
        id: parse
        env:
          COMMENT_BODY: ${{ github.event.comment.body }}
        run: |
          RESULT=$(echo "$COMMENT_BODY" | python3 .github/scripts/parse-e2e-comment.py) || {
            echo "::error::Failed to parse comment"
            echo "$RESULT" | jq -r '.errors[]' 2>/dev/null

            ERRORS=$(echo "$RESULT" | jq -r '.errors | map("- " + .) | join("\n")' 2>/dev/null || echo "- Unknown parsing error")

            gh api "repos/${{ github.repository }}/issues/comments/${{ github.event.comment.id }}/reactions" \
              -f content=confused --silent

            BODY=$(cat <<EOF
          Failed to parse test configurations:

          ${ERRORS}

          **Expected format:**
          \`\`\`
          /run-e2e
          \\\`\\\`\\\`yaml
          - rancher_version: head/2.14
            grep_test_by_tag: "@install"
            turtles_dev_chart: true
            destroy_runner: false
          \\\`\\\`\\\`
          \`\`\`
          EOF
          )
            gh api "repos/${{ github.repository }}/issues/${{ github.event.issue.number }}/comments" \
              -f body="$BODY"

            exit 1
          }

          echo "configs=$(echo "$RESULT" | jq -c '.configs')" >> "$GITHUB_OUTPUT"
          echo "count=$(echo "$RESULT" | jq '.configs | length')" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

      - name: Resolve PR branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          PR_DATA=$(gh api "repos/${{ github.repository }}/pulls/${{ github.event.issue.number }}")
          HEAD_REF=$(echo "$PR_DATA" | jq -r '.head.ref')
          echo "head_ref=${HEAD_REF}" >> "$GITHUB_OUTPUT"
          echo "PR branch: ${HEAD_REF}"

      - name: Dispatch workflows and collect run URLs
        id: dispatch
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          CONFIGS: ${{ steps.parse.outputs.configs }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          REPO: ${{ github.repository }}
        run: |
          COUNT=$(echo "$CONFIGS" | jq 'length')
          RESULTS="[]"

          for i in $(seq 0 $((COUNT - 1))); do
            CONFIG=$(echo "$CONFIGS" | jq -c ".[$i]")

            RANCHER_VERSION=$(echo "$CONFIG" | jq -r '.rancher_version')
            GREP_TAGS=$(echo "$CONFIG" | jq -r '.grep_test_by_tag')
            DEV_CHART=$(echo "$CONFIG" | jq -r '.turtles_dev_chart')
            DESTROY=$(echo "$CONFIG" | jq -r '.destroy_runner')

            echo "--- Dispatching run $((i + 1))/$COUNT ---"
            echo "  rancher_version: $RANCHER_VERSION"
            echo "  grep_test_by_tag: $GREP_TAGS"
            echo "  turtles_dev_chart: $DEV_CHART"
            echo "  destroy_runner: $DESTROY"

            # Record timestamp before dispatch (ISO 8601 UTC)
            BEFORE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")

            # Build inputs JSON
            INPUTS=$(echo "$CONFIG" | jq -c '.')

            # Dispatch the workflow
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" \
              -X POST \
              -H "Authorization: token $GH_TOKEN" \
              -H "Accept: application/vnd.github.v3+json" \
              "https://api.github.com/repos/${REPO}/actions/workflows/ui-e2e.yaml/dispatches" \
              -d "{\"ref\":\"${HEAD_REF}\",\"inputs\":${INPUTS}}")

            if [[ "$HTTP_CODE" != "204" ]]; then
              echo "::warning::Dispatch $((i + 1)) failed with HTTP $HTTP_CODE"
              RESULTS=$(echo "$RESULTS" | jq \
                --arg idx "$((i + 1))" \
                --arg rv "$RANCHER_VERSION" \
                --arg tags "$GREP_TAGS" \
                --arg dc "$DEV_CHART" \
                --arg dr "$DESTROY" \
                '. + [{"index": $idx, "rancher_version": $rv, "grep_test_by_tag": $tags, "turtles_dev_chart": $dc, "destroy_runner": $dr, "run_url": "FAILED", "run_id": "N/A"}]')
              continue
            fi

            echo "  Dispatch successful, polling for run ID..."

            # Poll for the new run
            RUN_URL=""
            RUN_ID=""
            for attempt in $(seq 1 20); do
              sleep 3
              RUNS=$(curl -s \
                -H "Authorization: token $GH_TOKEN" \
                -H "Accept: application/vnd.github.v3+json" \
                "https://api.github.com/repos/${REPO}/actions/workflows/ui-e2e.yaml/runs?event=workflow_dispatch&branch=${HEAD_REF}&created=>=${BEFORE}&per_page=5")

              RUN_ID=$(echo "$RUNS" | jq -r '[.workflow_runs[] | select(.id)] | sort_by(.created_at) | reverse | .[0].id // empty')

              if [[ -n "$RUN_ID" && "$RUN_ID" != "null" ]]; then
                # Verify this run ID isn't one we already captured
                ALREADY_CAPTURED=$(echo "$RESULTS" | jq --arg rid "$RUN_ID" '[.[] | select(.run_id == $rid)] | length')
                if [[ "$ALREADY_CAPTURED" == "0" ]]; then
                  RUN_URL="https://github.com/${REPO}/actions/runs/${RUN_ID}"
                  echo "  Found run: $RUN_URL"
                  break
                fi
              fi
            done

            if [[ -z "$RUN_URL" ]]; then
              echo "::warning::Could not determine run URL for dispatch $((i + 1))"
              RUN_URL="Could not determine URL"
              RUN_ID="N/A"
            fi

            RESULTS=$(echo "$RESULTS" | jq \
              --arg idx "$((i + 1))" \
              --arg rv "$RANCHER_VERSION" \
              --arg tags "$GREP_TAGS" \
              --arg dc "$DEV_CHART" \
              --arg dr "$DESTROY" \
              --arg url "$RUN_URL" \
              --arg rid "$RUN_ID" \
              '. + [{"index": $idx, "rancher_version": $rv, "grep_test_by_tag": $tags, "turtles_dev_chart": $dc, "destroy_runner": $dr, "run_url": $url, "run_id": $rid}]')
          done

          echo "results=$(echo "$RESULTS" | jq -c '.')" >> "$GITHUB_OUTPUT"

      - name: Post reply comment
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          RESULTS: ${{ steps.dispatch.outputs.results }}
          COMMENTER: ${{ github.event.comment.user.login }}
          PR_NUMBER: ${{ github.event.issue.number }}
          HEAD_REF: ${{ steps.pr.outputs.head_ref }}
          REPO: ${{ github.repository }}
        run: |
          TABLE_ROWS=""
          COUNT=$(echo "$RESULTS" | jq 'length')

          for i in $(seq 0 $((COUNT - 1))); do
            ROW=$(echo "$RESULTS" | jq -r ".[$i]")
            IDX=$(echo "$ROW" | jq -r '.index')
            RV=$(echo "$ROW" | jq -r '.rancher_version')
            TAGS=$(echo "$ROW" | jq -r '.grep_test_by_tag')
            DC=$(echo "$ROW" | jq -r '.turtles_dev_chart')
            DR=$(echo "$ROW" | jq -r '.destroy_runner')
            URL=$(echo "$ROW" | jq -r '.run_url')
            RID=$(echo "$ROW" | jq -r '.run_id')

            if [[ "$URL" == "FAILED" ]]; then
              LINK="Dispatch failed"
            elif [[ "$URL" == "Could not determine URL" ]]; then
              LINK="URL unavailable"
            else
              LINK="[Run #${RID}](${URL})"
            fi

            TABLE_ROWS="${TABLE_ROWS}| ${IDX} | ${RV} | ${TAGS} | ${DC} | ${DR} | ${LINK} |
          "
          done

          BODY=$(cat <<EOF
          **E2E Tests Triggered**

          | # | Rancher Version | Test Tags | Dev Chart | Destroy Runner | Run |
          |---|----------------|-----------|-----------|----------------|-----|
          ${TABLE_ROWS}
          Branch: \`${HEAD_REF}\` | Triggered by @${COMMENTER}
          EOF
          )

          gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" -f body="$BODY"
