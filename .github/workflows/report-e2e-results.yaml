name: Report E2E Results
run-name: "E2E result: #${{ github.event.workflow_run.run_number }} ${{ github.event.workflow_run.conclusion }}"

on:
  workflow_run:
    workflows: ["UI-E2E"]
    types: [completed]

jobs:
  update-comment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: read
    steps:
      - name: Map conclusion to status
        id: status
        run: |
          case "${{ github.event.workflow_run.conclusion }}" in
            success)    echo "emoji=✅" >> "$GITHUB_OUTPUT" ;;
            failure)    echo "emoji=❌" >> "$GITHUB_OUTPUT" ;;
            cancelled)  echo "emoji=⚠️" >> "$GITHUB_OUTPUT" ;;
            *)          echo "emoji=❓" >> "$GITHUB_OUTPUT" ;;
          esac

      - name: Find PR for branch
        id: pr
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          HEAD_BRANCH: ${{ github.event.workflow_run.head_branch }}
          REPO: ${{ github.repository }}
        run: |
          PR_NUMBER=$(gh pr list --repo "$REPO" --head "$HEAD_BRANCH" --state all \
            --json number --jq '.[0].number // empty')
          if [[ -z "$PR_NUMBER" ]]; then
            echo "No PR found for branch $HEAD_BRANCH, skipping"
            echo "found=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "number=$PR_NUMBER" >> "$GITHUB_OUTPUT"
          echo "found=true" >> "$GITHUB_OUTPUT"
          echo "Found PR #$PR_NUMBER for branch $HEAD_BRANCH"

      - name: Update PR comment with result
        if: steps.pr.outputs.found == 'true'
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          RUN_NUMBER: ${{ github.event.workflow_run.run_number }}
          STATUS: ${{ steps.status.outputs.emoji }}
          REPO: ${{ github.repository }}
        run: |
          # Find the "E2E Tests Triggered" comment containing this run number
          COMMENT_ID=$(gh api "repos/${REPO}/issues/${PR_NUMBER}/comments" \
            --paginate \
            --jq ".[] | select(.body | contains(\"E2E Tests Triggered\")) | select(.body | contains(\"[#${RUN_NUMBER}]\")) | .id" \
            | head -1)

          if [[ -z "$COMMENT_ID" ]]; then
            echo "No matching E2E comment found for run #$RUN_NUMBER on PR #$PR_NUMBER, skipping"
            exit 0
          fi

          echo "Found comment $COMMENT_ID, updating with $STATUS for run #$RUN_NUMBER"

          # Fetch comment body
          gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" --jq '.body' > /tmp/comment_body.txt

          # Update the run link with status emoji
          python3 <<'PYEOF' > /tmp/updated_body.txt
          import re, os
          with open('/tmp/comment_body.txt') as f:
              body = f.read()
          rn = os.environ['RUN_NUMBER']
          status = os.environ['STATUS']
          # Match [#N](url) followed by any existing status text before the table pipe
          pattern = r'(\[#' + re.escape(rn) + r'\]\([^)]+\))\s*[^|\n]*'
          print(re.sub(pattern, r'\1 ' + status + ' ', body, count=1), end='')
          PYEOF

          # Patch the comment
          jq -n --rawfile body /tmp/updated_body.txt '{body: $body}' | \
            gh api "repos/${REPO}/issues/comments/${COMMENT_ID}" \
              -X PATCH --input -

          echo "Successfully updated comment with $STATUS for run #$RUN_NUMBER"
